{% block content %}
<div class="panel-card">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
                <h2 class="sky-section-title mb-1">Team Dependencies</h2>
                <p class="page-subtitle">Upstream and downstream relationships between engineering teams.</p>
            </div>
            {% if user.is_staff %}
                <a href="{% url 'organisation:dependency_create' %}" class="btn btn-sky-primary">
                    <i class="bi bi-plus-lg me-2"></i>Add Dependency
                </a>
            {% endif %}
        </div>
    </div>
</div>

<div class="panel-card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                    <tr>
                        <th>Upstream Team</th>
                        <th>Relationship</th>
                        <th>Downstream Team</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody>
                    {% for dependency in dependencies %}
                    <tr>
                        <td>
                            <strong>{{ dependency.upstream_team.name }}</strong>
                            <div class="text-muted small">{{ dependency.upstream_team.department.name|default:"No department" }}</div>
                        </td>
                        <td class="text-muted">depends on</td>
                        <td>
                            <strong>{{ dependency.downstream_team.name }}</strong>
                            <div class="text-muted small">{{ dependency.downstream_team.department.name|default:"No department" }}</div>
                        </td>
                        <td>{{ dependency.description|default:"No description provided" }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="text-center text-muted py-4">No dependencies recorded yet.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
