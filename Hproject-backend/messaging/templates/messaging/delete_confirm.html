{% extends "messaging/base_messaging.html" %}

{% block messaging_content %}
<div class="panel-card mx-auto" style="max-width:480px;">
    <div class="card-body text-center p-5">
        <div style="width:56px; height:56px; border-radius:50%; background:#fee2e2; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:28px;"><i class="bi bi-exclamation-triangle"></i></div>
        <h4 class="sky-section-title mb-3">Delete Message</h4>
        <p class="text-muted mb-1">Are you sure you want to delete this message?</p>
        <p style="font-weight:500;" class="mb-4">"{{ message.subject }}"</p>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2 justify-content-center">
                <a href="{% if message.is_draft %}{% url 'messaging:drafts' %}{% else %}{% url 'messaging:message_detail' message.pk %}{% endif %}"
                   class="btn btn-sky-secondary">Cancel</a>
                <button type="submit" class="btn btn-sky-primary" style="background:#dc2626; border-color:#dc2626;">Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
