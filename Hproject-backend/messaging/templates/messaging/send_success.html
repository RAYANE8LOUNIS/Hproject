{% extends "messaging/base_messaging.html" %}

{% block messaging_content %}
<div class="panel-card">
    <div class="card-body text-center py-5 px-4">
        <div style="width:88px; height:88px; border-radius:50%; background:var(--success-bg); display:flex; align-items:center; justify-content:center; margin:0 auto 24px; font-size:40px; color:var(--success-text);"><i class="bi bi-check-lg"></i></div>
        <h2 class="sky-section-title mb-2" style="font-size:28px;">Message sent successfully.</h2>
        <p class="text-muted mb-4">Your message has been delivered to the team.</p>
        <a href="{% url 'messaging:inbox' %}" class="btn btn-sky-primary"><i class="bi bi-inbox me-2"></i>Return to inbox</a>
    </div>
</div>
{% endblock %}
