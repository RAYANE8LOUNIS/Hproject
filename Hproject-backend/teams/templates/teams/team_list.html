{% extends 'base.html' %}

{% block content %}
<h1>Teams</h1>

<form method="get" style="margin-bottom: 20px;">
    <input 
        type="text" 
        name="q" 
        placeholder="Search teams..." 
        value="{{ query|default:'' }}"
        style="padding: 8px; width: 250px;"
    >
    <button type="submit" class="btn">Search</button>
</form>

<p><strong>{{ teams|length }}</strong> team(s) found</p>

{% if teams %}
    <ul style="list-style: none; padding: 0;">
        {% for team in teams %}
            <li style="margin-bottom: 15px; padding: 15px; background: #f4f6f9; border-radius: 10px;">
                <a href="{% url 'team_detail' team.id %}">
                    <strong style="font-size: 18px;">{{ team.name }}</strong>
                </a>
                <br>
                <span style="color: #555;">
                    Department: {{ team.department.name }}
                </span>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>No teams available.</p>
{% endif %}

{% endblock %}
