{% extends 'base.html' %}

{% block content %}
<h1>Create Team</h1>

<form method="post">
    {% csrf_token %}

    <p>
        <label for="name">Team Name:</label><br>
        <input type="text" name="name" id="name" required style="width: 400px; padding: 8px;">
    </p>

    <p>
        <label for="description">Description:</label><br>
        <textarea name="description" id="description" rows="4" style="width: 400px; padding: 8px;" required></textarea>
    </p>

    <p>
        <label for="purpose">Purpose:</label><br>
        <textarea name="purpose" id="purpose" rows="4" style="width: 400px; padding: 8px;" required></textarea>
    </p>

    <p>
        <label for="department">Department:</label><br>
        <select name="department" id="department" required style="width: 420px; padding: 8px;">
            {% for department in departments %}
                <option value="{{ department.id }}">{{ department.name }}</option>
            {% endfor %}
        </select>
    </p>

    <p>
        <label for="team_type">Team Type:</label><br>
        <select name="team_type" id="team_type" required style="width: 420px; padding: 8px;">
            {% for team_type in team_types %}
                <option value="{{ team_type.id }}">{{ team_type.name }}</option>
            {% endfor %}
        </select>
    </p>

    <p>
        <label for="manager">Manager:</label><br>
        <select name="manager" id="manager" required style="width: 420px; padding: 8px;">
            {% for user in users %}
                <option value="{{ user.id }}">{{ user.username }}</option>
            {% endfor %}
        </select>
    </p>

    <p>
        <label for="members">Members:</label><br>
        <select name="members" id="members" multiple style="width: 420px; padding: 8px; height: 150px;">
            {% for user in users %}
                <option value="{{ user.id }}">{{ user.username }}</option>
            {% endfor %}
        </select>
    </p>

    <p>
        <label for="slack_channel">Slack Channel:</label><br>
        <input type="text" name="slack_channel" id="slack_channel" style="width: 400px; padding: 8px;">
    </p>

    <p>
        <label for="email">Email:</label><br>
        <input type="email" name="email" id="email" style="width: 400px; padding: 8px;">
    </p>

    <p>
        <label for="code_repository">Code Repository:</label><br>
        <input type="url" name="code_repository" id="code_repository" style="width: 400px; padding: 8px;">
    </p>

    <p>
        <label for="status">Status:</label><br>
        <select name="status" id="status" style="width: 420px; padding: 8px;">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="Disbanded">Disbanded</option>
        </select>
    </p>

    <p>
        <button type="submit" class="btn">Create Team</button>
        <a href="{% url 'team_list' %}" class="btn">Cancel</a>
    </p>
</form>

{% endblock %}
