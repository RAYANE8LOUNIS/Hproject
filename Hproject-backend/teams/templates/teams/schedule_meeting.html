{% extends 'base.html' %}

{% block content %}

<h1>Schedule Meeting</h1>

<div class="team-card">
    <h2>{{ team.name }}</h2>
    <p class="secondary-text">
        Set up a meeting for this team.
    </p>
</div>

<div class="team-card">
    <form method="post">
        {% csrf_token %}

        <label>Date</label>
        <input type="date" name="date" required>

        <label>Time</label>
        <input type="time" name="time" required>

        <label>Meeting Title</label>
        <input type="text" name="title" placeholder="Sprint Planning..." required>

        <label>Description</label>
        <textarea name="description" rows="4" placeholder="Meeting details..."></textarea>

        <button type="submit" class="btn">Schedule Meeting</button>
    </form>
</div>

<div style="margin-top: 20px;">
    <a href="{% url 'team_detail' team.id %}" class="btn">Back to Team</a>
</div>

{% endblock %}
