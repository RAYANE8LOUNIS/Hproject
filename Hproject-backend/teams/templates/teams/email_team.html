{% extends 'base.html' %}

{% block content %}
<h1>Email Team: {{ team.name }}</h1>

{% if team.email %}
    <p><strong>Team Email:</strong> {{ team.email }}</p>
    <p>
        <a href="mailto:{{ team.email }}" class="btn">Open Email App</a>
    </p>
{% else %}
    <p>No team email available.</p>
{% endif %}

<a href="{% url 'team_detail' team.id %}" class="btn">Back to Team</a>
{% endblock %}
